# Injected into every dist release-build job via `github-build-setup` (see
# dist-workspace.toml), right after checkout and before `dist build` runs.
# This snippet is generated into .github/workflows/release.yml by
# `dist generate`; hand-editing release.yml directly does not survive that
# regeneration, so this file is the source of truth.
#
# The tree carries *-sys/cc dependencies (lzma-sys, ring), and cc-rs errors on
# musl targets unless CC is wired (it searches for a `<triple>-gcc` that no
# runner ships and does not fall back). dist's release builds run each musl
# triple on the matching-arch Linux runner, same as ci.yml's cross job, so we
# wire both triples' CC to musl-gcc here; each build only consults its own
# triple's CC var, so exporting both on every Linux leg is harmless. The
# `if` guards keep this a no-op on the macOS legs this snippet also runs on.
- name: install musl-tools
  if: runner.os == 'Linux'
  run: sudo apt-get update && sudo apt-get install -y musl-tools
- name: wire musl C toolchain
  if: runner.os == 'Linux'
  run: |
    echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
    echo "CC_aarch64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
