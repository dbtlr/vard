name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly cargo audit / cargo deny refresh

env:
  CARGO_TERM_COLOR: always

jobs:
  # OS-independent gates run once, on the cheap runner.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned toolchain: keep in lockstep with rust-toolchain.toml and mise.toml.
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # --- `just check` gates (must match the Justfile exactly, no drift) ---
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --workspace --all-targets -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # --- docs gate (`just doc`) ---
      - name: cargo doc -D warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      # --- supply-chain gates (`just audit` / `just deny`) ---
      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check

  # OS-sensitive gates: the test suite plus install and artifact smokes.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Pinned toolchain: keep in lockstep with rust-toolchain.toml and mise.toml.
      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      # --- install + artifact smokes ---
      - name: cargo build -p vard --release --locked
        run: cargo build -p vard --release --locked

      - name: vard --version
        run: ./target/release/vard --version

      # Help must render through the custom CLI Help Output v2 path, not clap.
      # Assert markers that only the v2 renderer emits so a regression to clap
      # help (or a broken interceptor) fails loudly.
      - name: vard help renders through the v2 path
        run: |
          ./target/release/vard -h | grep -q 'For full help, run'
          ./target/release/vard --help | grep -q '^EXAMPLES$'
          ./target/release/vard run --help | grep -q '^LIFECYCLE AND SIGNALS$'
          # Color must respect the environment conventions: forced on emits
          # ANSI escapes; NO_COLOR suppresses them even under --color always.
          esc=$(printf '\033')
          ./target/release/vard --color always -h | grep -q "$esc"
          if NO_COLOR=1 ./target/release/vard --color always -h | grep -q "$esc"; then
            echo "::error::NO_COLOR did not suppress ANSI output"; exit 1
          fi

      # build.rs generates these on every build profile; the release build
      # above has already run it for this job's target dir. Assert the expected
      # command strings appear so a stale or truncated artifact fails loudly
      # instead of passing a bare non-empty check.
      - name: completions + manpage artifacts name the run subcommand
        run: |
          for f in \
            target/completions/vard.bash \
            target/completions/_vard \
            target/completions/vard.fish \
            target/completions/vard.nu \
            target/man/vard.1; do
            test -s "$f"
            grep -q 'run' "$f" || { echo "::error::$f is missing the 'run' subcommand — stale artifact?"; exit 1; }
          done
          # build.rs recurses subcommands into per-command manpages.
          test -s target/man/vard-run.1
          grep -q 'run' target/man/vard-run.1 || { echo "::error::vard-run.1 is missing 'run' — stale artifact?"; exit 1; }
