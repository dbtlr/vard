name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly cargo audit / cargo deny refresh
  workflow_dispatch:

# Superseded runs are cancelled for PRs; main/tag/schedule runs always complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # OS-independent gates run once, on the cheap runner.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned toolchain: keep in lockstep with rust-toolchain.toml and mise.toml.
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # --- `just check` gates (must match the Justfile exactly, no drift) ---
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --workspace --all-targets -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # --- docs gate (`just doc`) ---
      - name: cargo doc -D warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      # --- supply-chain gates (`just audit` / `just deny`) ---
      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check

  # OS-sensitive gates: the test suite plus install and artifact smokes.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Pinned toolchain: keep in lockstep with rust-toolchain.toml and mise.toml.
      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      # --- install + artifact smokes ---
      - name: cargo build -p vard --release --locked
        run: cargo build -p vard --release --locked

      - name: vard --version
        run: ./target/release/vard --version

      # Binary + artifact smoke assertions live in scripts/ci-smoke.sh so the
      # exact same checks run locally before a push — CI and local gates share
      # one source and cannot drift.
      - name: binary + artifact smokes (scripts/ci-smoke.sh)
        run: scripts/ci-smoke.sh

  # Cross-target build coverage for the triples release.yml ships via dist.
  # Build coverage only: no artifact uploads, no publishing — releases stay
  # tag-driven through release.yml. This job just proves the workspace still
  # compiles for each release target, and that the dist profile (thin LTO)
  # actually links, ahead of a tag push.
  cross:
    # An every-PR compile gate; the weekly schedule exists only for the lint
    # job's cargo-audit/deny refresh and gains nothing from a cross build.
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Target triples mirror dist-workspace.toml's `targets` list. The two
        # Linux legs mirror dist's own release topology: each musl triple builds
        # on a matching-arch runner with its native musl-gcc — the tree carries
        # C-compiled deps (lzma-sys, ring), so a cross-arch check would need a
        # cross C toolchain the runners don't have.
        include:
          - os: ubuntu-latest
            check-targets: x86_64-unknown-linux-musl
            dist-target: x86_64-unknown-linux-musl
            musl-cc-env: CC_x86_64_unknown_linux_musl
          - os: ubuntu-24.04-arm
            check-targets: aarch64-unknown-linux-musl
            dist-target: aarch64-unknown-linux-musl
            musl-cc-env: CC_aarch64_unknown_linux_musl
          - os: macos-latest
            check-targets: x86_64-apple-darwin aarch64-apple-darwin
            dist-target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # Pinned toolchain: keep in lockstep with rust-toolchain.toml and mise.toml.
      - uses: dtolnay/rust-toolchain@1.96.1

      - name: rustup target add
        run: rustup target add ${{ matrix.check-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Per-target key so cross caches don't thrash the test job's cache.
          key: cross-${{ matrix.dist-target }}

      - name: install musl-tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # The tree carries *-sys/cc dependencies (lzma-sys, ring), and cc-rs
      # errors on musl targets unless CC is wired (it searches for a
      # `<triple>-gcc` that no runner ships and does not fall back): each Linux
      # leg wires its native triple's CC to musl-gcc explicitly. dist's release
      # builds run on the same runner arches and get the same wiring via the
      # github-build-setup snippet (.github/build-setup.yml, referenced from
      # dist-workspace.toml), which dist generate injects into release.yml's
      # build-local-artifacts job.
      - name: wire musl C toolchain
        if: runner.os == 'Linux'
        run: echo "${{ matrix.musl-cc-env }}=musl-gcc" >> "$GITHUB_ENV"

      - name: cargo check --workspace --locked (cross targets)
        run: |
          for target in ${{ matrix.check-targets }}; do
            cargo check --workspace --locked --target "$target"
          done

      # Only a real build exercises the dist profile's thin-LTO link stage.
      - name: cargo build -p vard --profile dist --locked (dist-profile link)
        run: cargo build -p vard --profile dist --locked --target ${{ matrix.dist-target }}
