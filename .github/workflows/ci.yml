name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly cargo audit / cargo deny refresh

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Pinned to the toolchain in mise.toml. Keep these in lockstep.
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # --- `just check` gates (must match the Justfile exactly, no drift) ---
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --workspace --all-targets -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      # --- install + artifact smokes ---
      # The release build runs build.rs, generating completions and the manpage
      # into target/ before the smoke steps assert on them.
      - name: cargo build -p vard --release --locked
        run: cargo build -p vard --release --locked

      - name: vard --version
        run: ./target/release/vard --version

      - name: vard --help
        run: ./target/release/vard --help

      - name: completions + manpage artifacts exist and are non-empty
        run: |
          test -s target/completions/vard.bash
          test -s target/completions/_vard
          test -s target/completions/vard.fish
          test -s target/completions/vard.nu
          test -s target/man/vard.1

      # --- supply-chain gates (`just audit` / `just deny`) ---
      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check
