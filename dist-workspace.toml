[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# TEMPORARY (VRD-63 verification): run full build-and-upload on this PR so
# both musl legs actually compile ring/lzma-sys under CI, not just `dist
# plan`. Revert to the default ("plan") once the run is green.
pr-run-mode = "upload"
# Extra steps injected into every generated release-build job (right after
# checkout, before `dist build`); wires the musl C toolchain the Linux legs
# need for C-compiled deps (lzma-sys, ring). See .github/build-setup.yml.
github-build-setup = "../build-setup.yml"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl"]
# Whether to install an updater program
install-updater = false
# Extra static files to include in each App (path relative to the workspace root)
# One manpage per (sub)command; keep this list in sync with the subcommands.
# The `dist_manpages` test in the vard crate fails if a generated page is
# missing here.
include = ["target/completions/vard.bash", "target/completions/_vard", "target/completions/vard.fish", "target/completions/vard.nu", "target/man/vard.1", "target/man/vard-run.1", "target/man/vard-watch.1", "target/man/vard-watch-add.1", "target/man/vard-watch-remove.1", "target/man/vard-watch-list.1", "target/man/vard-watch-set.1", "target/man/vard-watch-pause.1", "target/man/vard-watch-resume.1", "target/man/vard-watch-sync.1", "target/man/vard-snapshot.1", "target/man/vard-sync.1", "target/man/vard-history.1", "target/man/vard-diff.1", "target/man/vard-restore.1", "target/man/vard-notify.1", "target/man/vard-status.1", "target/man/vard-logs.1", "target/man/vard-doctor.1", "target/man/vard-self-update.1", "target/man/vard-config.1", "target/man/vard-config-get.1", "target/man/vard-config-set.1", "target/man/vard-config-unset.1", "target/man/vard-config-edit.1", "target/man/vard-config-path.1", "target/man/vard-service.1", "target/man/vard-service-install.1", "target/man/vard-service-uninstall.1", "target/man/vard-service-start.1", "target/man/vard-service-stop.1", "target/man/vard-service-restart.1"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
