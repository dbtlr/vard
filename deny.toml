[graph]
all-features = true

[advisories]
yanked = "deny"
# "all" flags unmaintained advisories on transitive dependencies too;
# "workspace" would only check direct dependencies of workspace crates.
unmaintained = "all"

[licenses]
# The workspace is MIT; this is the permissive set its dependency tree needs.
# Trimmed to the licenses actually present — add to this list (with review) as
# new dependencies land rather than pre-allowing licenses that never appear.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    # notify (the filesystem-watch backend) is dedicated to the public domain
    # under CC0-1.0 — a permissive dedication compatible with an MIT project.
    "CC0-1.0",
    # inotify / inotify-sys (notify's Linux backend, compiled only on Linux)
    # are ISC-licensed, a simple permissive license in the MIT family.
    "ISC",
    # subtle (constant-time crypto primitives, pulled in by the rustls TLS
    # stack the self-update client uses) is BSD-3-Clause — a permissive license
    # compatible with an MIT project.
    "BSD-3-Clause",
    # webpki-roots (the Mozilla CA bundle rustls trusts for the self-update
    # client's TLS) ships the certificate data under CDLA-Permissive-2.0, a
    # permissive data license.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
# vard-core is a pure path dependency (no version until it is published, see
# VRD-29), which cargo-deny reports as a wildcard. Keep this at "warn" so the
# build does not fail on it.
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
